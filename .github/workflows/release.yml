name: Release

# Builds the branded native installer on EACH OS (so you don't need to own all
# three machines) and attaches them to the GitHub Release. Triggers when you push
# a version tag, e.g.  git tag v2.3.0 && git push --tags
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}      # also runnable by hand from the Actions tab

permissions:
  contents: write            # needed to create/update the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so `git archive` works

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PyInstaller + pywebview
        run: python -m pip install --upgrade pip pyinstaller pywebview

      - name: Install WebKitGTK for pywebview (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-gtk-3.0 gir1.2-webkit2-4.1 libgirepository1.0-dev

      - name: Install appimagetool (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo curl -L -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Build native installer
        run: python installers/native/build.py

      - name: Build ready-to-run source zip (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VER=$(python -c "import re;print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('namma_agent/version.py').read()).group(1))")
          mv installers/native/build/app "installers/native/build/Namma-Agent-$VER"
          (cd installers/native/build && zip -qr "../dist/Namma-Agent-$VER.zip" "Namma-Agent-$VER")

      - name: Upload installers to the Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installers/native/dist/*
          generate_release_notes: true

      - name: Upload installers as build artifacts (manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: namma-agent-installer-${{ matrix.os }}
          path: installers/native/dist/*
