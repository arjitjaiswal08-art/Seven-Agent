name: Bug report
description: Something Namma Agent did wrong — a wrong tool call, a crash, or a wrong answer.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! The more precisely you describe **what you
        said** and **what the assistant did**, the faster we can reproduce it.

        > For security vulnerabilities, do **not** open an issue — see
        > [SECURITY.md](../../blob/main/SECURITY.md).
  - type: textarea
    id: said
    attributes:
      label: What you said / did
      description: The exact message you typed (or spoke), or the steps you took.
      placeholder: |
        "Organize my Downloads folder by file type"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: Files moved into per-type subfolders, with a summary.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Include the assistant's reply if relevant.
      placeholder: It said it organized them, but nothing moved.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpt
      description: |
        Paste the relevant lines from `logs/namma_agent.log`. Set
        `logging.level: debug` (or `NAMMA_LOG_LEVEL=debug`) to capture the
        full tool/turn trace for the affected message.
      render: text
  - type: input
    id: provider
    attributes:
      label: Provider / model
      description: Which brain were you using? (e.g. anthropic / claude-opus-4-8, ollama / llama3.1)
      placeholder: anthropic / claude-opus-4-8
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - Windows
        - macOS (unsupported, best-effort)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD`, or the release tag.
      placeholder: c5514fe
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm on a supported Python version (3.10–3.13).
          required: true
