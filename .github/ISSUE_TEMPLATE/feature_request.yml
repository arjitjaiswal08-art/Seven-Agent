name: Feature request
description: Propose a new capability or behavior — a tool, a skill, or a UI improvement.
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Namma Agent acts through **tools the model calls natively** and
        **skills** (Markdown playbooks over existing tools). Lead with what you
        want to do and what the assistant should do back — the implementation
        can follow. See [EXTENDING.md](../../blob/main/docs/EXTENDING.md).
  - type: textarea
    id: phrasing
    attributes:
      label: What you'd ask for
      description: The natural request you'd type or speak to trigger this.
      placeholder: |
        "Summarize the PDFs in this project and quiz me on them"
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What the assistant should do
      placeholder: Read the project documents, produce a summary, then pose quiz cards.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this is useful
      description: The problem it solves or the workflow it improves.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Namma Agent does this touch?
      options:
        - Agent loop / providers
        - Tools (files, shell, web, browser, network, etc.)
        - Projects & document intelligence (RAG)
        - Learning Room
        - Memory / personas / skills
        - Voice & messaging (Telegram/Discord)
        - Web UI
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other approaches, existing capabilities that almost do this, etc.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't already requested.
          required: true
        - label: I've read CONTRIBUTING.md — new tools ship as a `register(registry)` module with a test.
          required: false
