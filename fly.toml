app = "seven-agent"
primary_region = "sjc"

[build]
  [build.args]
    NODE_VERSION = "20"
    PYTHON_VERSION = "3.11"

[env]
  PORT = "8000"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
