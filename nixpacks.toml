[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r namma_agent/requirements.txt"
]

[phases.build]
dependsOn = ["install"]
cmds = [
  "cd namma_agent/webui",
  "npm ci",
  "npm run build",
  "cd ../.."
]

[start]
cmd = "python -m namma_agent --server"
