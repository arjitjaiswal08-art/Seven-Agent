# Local, free embeddings for the Cognee integration (DEV ONLY — no production goals).
# See D:\AGI\Cognee_Implementation.md §1.5 / §5.
#
# ARCHITECTURE (isolated — protects Namma's venv):
#   - Cognee itself runs in its OWN container (cognee/cognee-mcp:main), launched
#     on demand by Namma's MCP client via `docker run -i` (stdio). It is NOT in
#     this compose file and NOT installed into Namma's Python env.
#   - This compose file runs only OLLAMA, which serves the free local EMBEDDING
#     model (nomic-embed-text). The extraction LLM is Groq (cloud, fast) — set in
#     .env.cognee, not here.
#   - Cognee's stores (LanceDB vectors, Kuzu graph, SQLite metadata) are files on
#     a Docker volume mounted into the cognee container (see the MCP run command).
#
# Usage:
#   docker compose -f docker-compose.cognee.yml up -d
#   docker exec namma-cognee-ollama ollama pull nomic-embed-text   # ~275 MB, free
#
# Then add the Cognee MCP server in Namma → Settings → MCP → Config (see §5).

services:
  ollama:
    image: ollama/ollama:latest
    container_name: namma-cognee-ollama
    ports:
      - "11434:11434"          # reachable from the cognee container via host.docker.internal:11434
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-models:
  cognee-data:                 # persists Cognee's graph/vector/sqlite across MCP sessions
