services:
  - type: web
    name: seven-agent
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r namma_agent/requirements.txt &&
      cd namma_agent/webui &&
      npm install &&
      npm run build
    startCommand: python -m namma_agent --server
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
