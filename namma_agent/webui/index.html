<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>Namma Agent</title>
    <!-- Set the tab title from the last-known custom name before React mounts,
         so a reload doesn't flash the default "Namma Agent". -->
    <script>try { var n = localStorage.getItem("namma-assistant-name"); if (n) document.title = n; } catch (e) {}</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
